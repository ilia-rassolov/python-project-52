<!doctype html>
<html lang="en">
  <head  id="head">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Менеджер задач Hexlet</title>
    {% csrf_token %}
    {% load django_bootstrap5 %}
    {% bootstrap_css %}
  </head>
  <body>
      <nav class="navbar navbar-light bg-light">
        <a class="navbar-brand ms-3" href="/">Менеджер задач</a>
        <a class="navbar-nav nav-link ms-2" href="{% url 'user-list' %}">Пользователи</a>
        <a class="navbar-nav nav-link ms-3" href="/login">Вход</a>
        <a class="navbar-nav nav-link nav-link ms-3" href="{% url 'signup' %}">Регистрация</a>
        <a class="navbar-nav me-auto nav-link ms-3" href="/admin">Admin</a>
      </nav>
      <div id="content">
        {% block content %}{% endblock %}
      </div>
      <footer>
          <div class="container my-5 pt-4 border-top fixed-bottom">
              <a target="_blank" href="https://ru.hexlet.io">Hexlet</a>
          </div>
      </footer>
  </body>
</html>
